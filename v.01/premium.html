<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>premium</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <style>
        #premium-start {
            display: block;
            text-align: center;
            margin: 0 auto;
            padding: 6px 10px !important;
            font-size: 0.9rem !important;
        }
    </style>

</head>
<body>
    <header class="page-header">
        <h1>Premium</h1>
        <p>Desafios especiais com três níveis para cada tipo de operação.</p>
    </header>

    <main class="grid">
        <article class="card">
            <h3>Quiz Premium + / -</h3>
            <p>Escolha um nível.</p>
            <div class="operacoes">
                <ul>
                    <li><a class="premium-link" href="premium1.html"><button>Nível 1</button></a></li>
                    <li><a class="premium-link" href="premium1_2.html"><button>Nível 2</button></a></li>
                    <li><a class="premium-link" href="premium1_3.html"><button>Nível 3</button></a></li>
                </ul>
            </div>
        </article>
        <article class="card">
            <h3>Quiz Premium - / ×</h3>
            <p>Escolha um nível.</p>
            <div class="operacoes">
                <ul>
                    <li><a class="premium-link" href="premium2.html"><button>Nível 1</button></a></li>
                    <li><a class="premium-link" href="premium2_2.html"><button>Nível 2</button></a></li>
                    <li><a class="premium-link" href="premium2_3.html"><button>Nível 3</button></a></li>
                </ul>
            </div>
        </article>
        <article class="card">
            <h3>Quiz Premium × / ÷</h3>
            <p>Escolha um nível.</p>
            <div class="operacoes">
                <ul>
                    <li><a class="premium-link" href="premium3.html"><button>Nível 1</button></a></li>
                    <li><a class="premium-link" href="premium3_2.html"><button>Nível 2</button></a></li>
                    <li><a class="premium-link" href="premium3_3.html"><button>Nível 3</button></a></li>
                </ul>
            </div>
        </article>
    </main>
    <script src="auth.js" defer></script>
    <script>
    document.addEventListener('DOMContentLoaded', function(){
        try{
            if(typeof window.isAuthenticated === 'function' && !window.isAuthenticated()){
                const links = document.querySelectorAll('.premium-link');
                links.forEach(function(link){
                    const href = link.getAttribute('href');
                    if(!href) return;
                    const next = encodeURIComponent(href);
                    link.href = 'login.html?next=' + next;
                    const button = link.querySelector('button');
                    if(button) button.textContent = 'Entrar para acessar';
                });
            }
        }catch(e){ /* ignore */ }
    });
    </script>
</body>
</html>
